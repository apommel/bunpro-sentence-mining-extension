<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bunpro Sentence Mining</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      width: 250px;
      padding: 14px 16px;
      color: #222;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 12px;
    }
    .logo {
      width: 28px; height: 28px;
      background: #4a7fd4;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 15px; flex-shrink: 0;
    }
    h1 { font-size: 14px; font-weight: 600; }
    .sub { font-size: 11px; color: #888; }

    hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }

    .status-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #555; margin-bottom: 10px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ccc; flex-shrink: 0;
    }
    .dot.ok  { background: #2d8a55; }
    .dot.warn { background: #c07c00; }

    .tip {
      font-size: 12px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .tip strong { color: #222; }

    .btn {
      display: block;
      width: 100%;
      padding: 7px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12.5px;
      color: #333;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }
    .btn:hover { background: #e4e4e4; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">文</div>
    <div>
      <h1>Bunpro Sentence Mining</h1>
      <p class="sub">Self-Study Tool</p>
    </div>
  </div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="statusText">Checking…</span>
  </div>

  <hr />

  <p class="tip">
    <strong>Select</strong> a Japanese word, then
    <strong>right-click → Study in Bunpro</strong>.
  </p>

  <button class="btn" id="openOptions">Open settings</button>

  <script src="popup.js"></script>
</body>
</html>
